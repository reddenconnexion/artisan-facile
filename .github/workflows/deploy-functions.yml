name: Deploy Supabase Edge Functions

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Check secrets and CLI
        run: |
          supabase --version
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "ERROR: SUPABASE_ACCESS_TOKEN is not set"
            exit 1
          fi
          if [ -z "${{ secrets.SUPABASE_PROJECT_ID }}" ]; then
            echo "ERROR: SUPABASE_PROJECT_ID secret is not set"
            exit 1
          fi
          echo "✓ SUPABASE_ACCESS_TOKEN is set (length: ${#SUPABASE_ACCESS_TOKEN})"
          echo "✓ SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Edge Functions
        run: |
          FAILED=()
          # Auto-découverte : chaque sous-dossier de supabase/functions/ contenant
          # un index.ts est une fonction à déployer (on ignore _shared, qui n'est
          # qu'une librairie partagée). Plus besoin de maintenir une liste à la main.
          FUNCTIONS=()
          for dir in supabase/functions/*/; do
            name=$(basename "$dir")
            [ "$name" = "_shared" ] && continue
            [ -f "${dir}index.ts" ] || continue
            FUNCTIONS+=("$name")
          done
          echo "Fonctions détectées : ${FUNCTIONS[*]}"
          for fn in "${FUNCTIONS[@]}"; do
            echo "→ Deploying $fn..."
            if ! supabase functions deploy "$fn" --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} 2>&1; then
              echo "✗ FAILED: $fn"
              FAILED+=("$fn")
            else
              echo "✓ OK: $fn"
            fi
          done
          if [ ${#FAILED[@]} -gt 0 ]; then
            echo ""
            echo "The following functions failed to deploy:"
            for fn in "${FAILED[@]}"; do echo "  - $fn"; done
            exit 1
          fi
          echo ""
          echo "All functions deployed successfully."
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
