<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Artisan Facile">
  <!-- Blue background -->
  <rect width="100" height="100" fill="#1A5DA8"/>

  <!-- A — left diagonal leg -->
  <polygon points="4,90 17,90 36,10 23,10" fill="white"/>

  <!-- A right leg / F diagonal (the ruler element) -->
  <polygon points="23,10 38,10 63,90 48,90" fill="white"/>

  <!-- F — top horizontal bar -->
  <rect x="23" y="10" width="69" height="13" fill="white"/>

  <!-- F — middle horizontal bar -->
  <rect x="47" y="44" width="43" height="11" fill="white"/>

  <!-- Ruler tick marks -->
  <line x1="32" y1="31" x2="42" y2="28" stroke="#0B2E5C" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="39" y1="52" x2="49" y2="49" stroke="#0B2E5C" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="46" y1="72" x2="56" y2="69" stroke="#0B2E5C" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Ruler numbers -->
  <text x="37" y="27" font-size="6" font-family="Arial,sans-serif" fill="#0B2E5C" font-weight="bold">1</text>
  <text x="44" y="48" font-size="6" font-family="Arial,sans-serif" fill="#0B2E5C" font-weight="bold">2</text>
  <text x="51" y="68" font-size="6" font-family="Arial,sans-serif" fill="#0B2E5C" font-weight="bold">3</text>
</svg>
