name: Deploy Supabase Edge Functions

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        run: |
          FAILED=()
          FUNCTIONS=(
            ai-proxy
            plan-vision
            voice-transcribe
            create-checkout-session
            stripe-portal
            stripe-webhook
            transmit-invoice
            request-quote-otp
            save-openai-key
            notify-artisan-portal-signature
            pdp-webhook
          )
          for fn in "${FUNCTIONS[@]}"; do
            echo "→ Deploying $fn..."
            if ! supabase functions deploy "$fn" --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}; then
              echo "✗ FAILED: $fn"
              FAILED+=("$fn")
            else
              echo "✓ OK: $fn"
            fi
          done
          if [ ${#FAILED[@]} -gt 0 ]; then
            echo ""
            echo "The following functions failed to deploy:"
            for fn in "${FAILED[@]}"; do echo "  - $fn"; done
            exit 1
          fi
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
